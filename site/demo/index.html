<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — pachinko</title>
  <link rel="stylesheet" href="../src/style.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../" class="logo">pachinko</a>
      <a href="../">Home</a>
      <a href="../demo/" class="active">Demo</a>
      <a href="../api/">API</a>
      <a href="https://github.com/nacal/pachinko">GitHub</a>
    </div>
  </nav>

  <div class="container">
    <h1>Reel Demo</h1>
    <p style="color: var(--text-muted); margin-top: 0.5rem;">
      Press Spin to run the full pachinko pipeline — lottery, reel animation, and presentation effects.
    </p>

    <div class="demo-area">
      <div class="demo-canvas-wrapper">
        <div class="demo-canvas-stack">
          <canvas id="reel-canvas" width="480" height="240"></canvas>
          <canvas id="effects-canvas" width="480" height="240"></canvas>
        </div>
      </div>

      <div class="demo-controls">
        <button id="btn-spin" class="btn btn-primary">Spin</button>
        <button id="btn-skip" class="btn btn-secondary">Skip</button>
      </div>

      <div class="demo-mode-banner" id="mode-banner">
        <span class="mode-label" id="mode-label">通常</span>
        <span class="mode-detail" id="mode-detail"></span>
      </div>

      <div class="demo-info">
        <h3>Result</h3>
        <div class="stat">
          <span class="stat-label">結果</span>
          <span class="stat-value" id="stat-outcome">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">図柄</span>
          <span class="stat-value" id="stat-reels">— — —</span>
        </div>
        <div class="stat">
          <span class="stat-label">リーチ</span>
          <span class="stat-value" id="stat-reach">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">ボーナス</span>
          <span class="stat-value" id="stat-bonus">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">回転数</span>
          <span class="stat-value" id="stat-spins">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">連チャン</span>
          <span class="stat-value" id="stat-consecutive">0</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>MIT License &copy; 2026 nacal &mdash; <a href="https://github.com/nacal/pachinko">GitHub</a></p>
  </footer>

  <script type="module" src="../src/demo.ts"></script>
</body>
</html>
