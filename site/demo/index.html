<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — pachinko</title>
  <link rel="stylesheet" href="../src/style.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../" class="logo">pachinko</a>
      <a href="../">Home</a>
      <a href="../demo/" class="active">Demo</a>
      <a href="../api/">API</a>
      <a href="../ui/">UI</a>
      <a href="https://github.com/nacal/pachinko" target="_blank" rel="noopener noreferrer">GitHub<svg class="external-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2 7 9"/></svg></a>
    </div>
  </nav>

  <div class="container">
    <h1>Reel Demo</h1>
    <p style="color: var(--text-muted); margin-top: 0.5rem;">
      Press Spin to run the full pachinko pipeline — lottery, reel animation, and presentation effects.
    </p>

    <div class="demo-area">
      <div class="demo-canvas-wrapper">
        <canvas id="stats-panel" width="480" height="220"></canvas>
        <div class="demo-canvas-stack">
          <canvas id="bg-canvas" width="480" height="240"></canvas>
          <canvas id="reel-canvas" width="480" height="240"></canvas>
          <canvas id="effects-canvas" width="480" height="240"></canvas>
        </div>
        <canvas id="reserve-canvas" width="480" height="40"></canvas>
      </div>

      <div class="demo-controls">
        <button id="btn-spin" class="btn btn-primary">Spin</button>
        <button id="btn-confirm" class="btn btn-primary" style="display:none;">Confirm</button>
        <button id="btn-skip" class="btn btn-secondary">Skip</button>
        <label class="demo-auto-toggle">
          <input type="checkbox" id="chk-auto" />
          Auto
        </label>
        <select id="sel-speed" class="demo-select">
          <option value="500">Normal</option>
          <option value="200">Fast</option>
          <option value="0">Instant</option>
        </select>
      </div>

      <div class="demo-trigger-panel">
        <h3>Trigger</h3>
        <div class="demo-trigger-buttons">
          <button class="btn btn-trigger" data-trigger="oatari">大当たり</button>
          <button class="btn btn-trigger" data-trigger="reach-hazure">リーチハズレ</button>
          <button class="btn btn-trigger" data-trigger="hazure">通常ハズレ</button>
          <button class="btn btn-trigger" data-trigger="pseudo1">擬似連×2</button>
          <button class="btn btn-trigger" data-trigger="pseudo2">擬似連×3</button>
          <button class="btn btn-trigger" data-trigger="pseudo3">擬似連×4</button>
          <button class="btn btn-trigger" data-trigger="kakuhen">確変突入</button>
        </div>
      </div>

      <div class="demo-mode-banner" id="mode-banner">
        <span class="mode-label" id="mode-label">通常</span>
        <span class="mode-detail" id="mode-detail"></span>
      </div>

      <div class="demo-info" id="color-expectations">
        <h3>保留色 期待度</h3>
        <div id="color-legend"></div>
      </div>

      <div class="demo-charts">
        <div class="demo-chart-wrapper">
          <h3>スランプグラフ</h3>
          <canvas id="slump-graph" width="480" height="240"></canvas>
        </div>
        <div class="demo-chart-wrapper">
          <h3>大当たり履歴</h3>
          <canvas id="hit-history" width="480" height="240"></canvas>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>MIT License &copy; 2026 nacal &mdash; <a href="https://github.com/nacal/pachinko" target="_blank" rel="noopener noreferrer">GitHub<svg class="external-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 2h5v5"/><path d="M14 2 7 9"/></svg></a></p>
  </footer>

  <script type="module" src="../src/main.ts"></script>
  <script type="module" src="../src/demo.ts"></script>
</body>
</html>
